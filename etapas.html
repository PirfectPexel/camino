<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2c5f3d">
  <title>Etapas · Camino Portugués</title>
  <link rel="manifest" href="/camino/manifest.json">
  <link rel="stylesheet" href="/camino/css/style.css">
  <link rel="icon" type="image/png" sizes="192x192" href="/camino/icons/icon-192.png">
</head>
<body>
  <header class="topbar">
    <a href="/camino/" class="back" aria-label="Inicio">←</a>
    <div class="title">📅 Las 7 etapas</div>
  </header>

  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div style="text-align:center;margin-top:-8px;font-size:12px;color:#5a6e5c" id="progress-text">0 de 7 etapas completadas</div>

  <div class="timeline" id="timeline">
    <!-- Inyectado por JS -->
  </div>

  <script type="module">
    import { getCurrentStage } from '/camino/js/app.js';
    import { isCompleted, getCompletedStages } from '/camino/js/progress.js';

    // Cada etapa lista los pueblos por los que pasa, terminando en el destino.
    // Cada pueblo enlaza a etapa-N.html#ancla del sub-acordeón correspondiente.
    const STAGES_INFO = [
      {
        id: 0, sub: '0', tramo: 'Llegada a Tui', km: null, fecha: 'Sáb 16 may',
        pueblos: [
          { ancla: 'llegar', name: 'Tui', destino: true }
        ]
      },
      {
        id: 1, sub: '1', tramo: 'Tui → O Porriño', km: 16, fecha: 'Dom 17 may',
        pueblos: [
          { ancla: 'pueblo-ribadelouro', name: 'Ribadelouro' },
          { ancla: 'pueblo-orbenlle',    name: 'Orbenlle' },
          { ancla: 'llegar',             name: 'O Porriño', destino: true }
        ]
      },
      {
        id: 2, sub: '2', tramo: 'O Porriño → Redondela', km: 16, fecha: 'Lun 18 may',
        pueblos: [
          { ancla: 'pueblo-mos',        name: 'Mos' },
          { ancla: 'pueblo-saxamonde',  name: 'Saxamonde' },
          { ancla: 'llegar',            name: 'Redondela', destino: true }
        ]
      },
      {
        id: 3, sub: '3', tramo: 'Redondela → Pontevedra', km: 20, fecha: 'Mar 19 may',
        pueblos: [
          { ancla: 'pueblo-cesantes',       name: 'Cesantes' },
          { ancla: 'pueblo-arcade',         name: 'Arcade' },
          { ancla: 'pueblo-ponte-sampaio',  name: 'Ponte Sampaio' },
          { ancla: 'llegar',                name: 'Pontevedra', destino: true }
        ]
      },
      {
        id: 4, sub: '4', tramo: 'Pontevedra → Caldas', km: 22, fecha: 'Mié 20 may',
        pueblos: [
          { ancla: 'pueblo-san-amaro', name: 'San Amaro' },
          { ancla: 'pueblo-briallos',  name: 'Briallos' },
          { ancla: 'llegar',           name: 'Caldas de Reis', destino: true }
        ]
      },
      {
        id: 5, sub: '5', tramo: 'Caldas → Padrón', km: 19, fecha: 'Jue 21 may',
        pueblos: [
          { ancla: 'pueblo-carracedo',     name: 'Carracedo' },
          { ancla: 'pueblo-pontecesures',  name: 'Pontecesures' },
          { ancla: 'llegar',               name: 'Padrón', destino: true }
        ]
      },
      {
        id: 6, sub: '6', tramo: 'Padrón → Santiago', km: 25, fecha: 'Vie 22 may',
        pueblos: [
          { ancla: 'pueblo-a-escravitude', name: 'A Escravitude' },
          { ancla: 'pueblo-picarana',      name: 'Picaraña' },
          { ancla: 'pueblo-teo',           name: 'Teo' },
          { ancla: 'pueblo-o-milladoiro',  name: 'O Milladoiro' },
          { ancla: 'llegar',               name: 'Santiago', destino: true }
        ]
      }
    ];

    const r = getCurrentStage();
    const todayId = (r.label === 'today' || r.label === 'santiago') ? r.stageId : null;

    const tl = document.getElementById('timeline');
    tl.innerHTML = STAGES_INFO.map(s => {
      const done = isCompleted(s.id);
      const isToday = todayId === s.id;
      const cls = ['t-item'];
      if (done) cls.push('done');
      if (isToday) cls.push('today');

      const numCls = ['t-num'];
      if (done) numCls.push('done');
      if (isToday) numCls.push('today');

      const numContent = done ? '✓' : s.sub;
      const km = s.km ? `${s.km} km · ` : '';
      const todayBadge = isToday ? ' <span style="color:#c89a3c;font-weight:700">· HOY</span>' : '';

      // Sub-pueblos de la etapa (siempre visibles)
      const subList = s.pueblos.map((p, i) => {
        const num = `${s.id}.${i + 1}`;
        const destinoBadge = p.destino ? ' <span style="color:#c89a3c;font-size:10px;font-weight:700">· DESTINO</span>' : '';
        const href = p.destino
          ? `/camino/etapa-${s.id}.html#${p.ancla}`
          : `/camino/${p.ancla}.html`;
        return `
          <a href="${href}" class="t-pueblo${p.destino ? ' destino' : ''}">
            <span class="t-pueblo-num">${num}</span>${p.name}${destinoBadge}
          </a>
        `;
      }).join('');

      return `
        <div class="t-group">
          <a href="/camino/etapa-${s.id}.html" class="${cls.join(' ')}" style="text-decoration:none;color:inherit;display:flex">
            <div class="${numCls.join(' ')}">${numContent}</div>
            <div class="t-info">
              <div class="t-titulo">${s.tramo}${todayBadge}</div>
              <div class="t-meta">${km}${s.fecha}</div>
            </div>
          </a>
          <div class="t-pueblos">${subList}</div>
        </div>
      `;
    }).join('');

    const completed = getCompletedStages();
    const pct = Math.round((completed.length / 7) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent =
      `${completed.length} de 7 etapas completadas`;
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/camino/sw.js'));
    }
  </script>
</body>
</html>
